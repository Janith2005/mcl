[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcl-api"
version = "0.1.0"
description = "Influence Pirates FastAPI backend"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "pydantic-settings>=2.0",
    "pydantic[email]>=2.0",
    "mcl-pipeline",
    "arq>=0.25",
    "redis>=5.0.0",
    "supabase>=2.0.0",
    "python-jose[cryptography]>=3.3.0",
    "httpx>=0.27.0",
    "websockets>=12.0",
    "bcrypt>=4.0",
    "resend>=2.0",
    "structlog>=23.0",
    "openai>=1.0.0",
    "python-multipart>=0.0.9",
    "python-dotenv>=1.0.0",
    "pypdf>=4.0.0",
    "sentry-sdk>=1.0.0",
    "stripe>=7.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "httpx>=0.27.0",
    "mypy>=1.0",
]
