[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcl"
version = "0.1.0"
description = "Influence Pirates CLI - content pipeline from your terminal"
requires-python = ">=3.11"
dependencies = [
    "mcl-pipeline",
    "typer[all]>=0.9",
    "rich>=13.0",
    "httpx>=0.27.0",
    "toml>=0.10",
]

[project.scripts]
mcl = "mcl_cli.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["mcl_cli"]
