<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed": "#36003e",
              "primary": "#814586",
              "surface": "#fcf8fb",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "surface-container-low": "#f6f3f5",
              "surface-container-highest": "#e4e2e4",
              "on-surface": "#1b1b1d",
              "outline-variant": "#d2c2ce",
              "on-tertiary-container": "#fefcff",
              "error": "#ba1a1a",
              "surface-container-high": "#eae7ea",
              "on-error": "#ffffff",
              "primary-fixed": "#ffd6fc",
              "inverse-on-surface": "#f3f0f2",
              "primary-container": "#9c5da1",
              "on-secondary-fixed-variant": "#7d2b29",
              "inverse-surface": "#303032",
              "on-primary": "#ffffff",
              "inverse-primary": "#f6aef8",
              "secondary-fixed-dim": "#ffb3ae",
              "surface-dim": "#dcd9dc",
              "tertiary-container": "#747479",
              "outline": "#80737e",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed": "#1a1b1f",
              "surface-bright": "#fcf8fb",
              "surface-container": "#f0edef",
              "on-tertiary-fixed-variant": "#46464b",
              "on-background": "#1b1b1d",
              "tertiary-fixed": "#e3e2e7",
              "on-surface-variant": "#4e434d",
              "secondary-container": "#fe8e88",
              "primary-fixed-dim": "#f6aef8",
              "tertiary": "#5b5c60",
              "on-primary-container": "#fffbff",
              "tertiary-fixed-dim": "#c7c6cb",
              "secondary-fixed": "#ffdad7",
              "on-secondary": "#ffffff",
              "background": "#fcf8fb",
              "on-secondary-container": "#762524",
              "secondary": "#9c423f",
              "on-tertiary": "#ffffff",
              "on-primary-fixed-variant": "#692f6f",
              "surface-variant": "#e4e2e4",
              "surface-tint": "#844789",
              "on-secondary-fixed": "#410005"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .holo-prism-blur {
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
        }
        .energy-orb {
            filter: blur(120px);
            opacity: 0.15;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen flex items-center justify-center overflow-hidden relative">
<!-- Luminous Lab Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<!-- Energy Orb 1 -->
<div class="energy-orb absolute -top-24 -left-24 w-[600px] h-[600px] bg-primary rounded-full"></div>
<!-- Energy Orb 2 -->
<div class="energy-orb absolute top-1/2 -right-48 w-[500px] h-[500px] bg-secondary rounded-full"></div>
<!-- Energy Orb 3 -->
<div class="energy-orb absolute -bottom-32 left-1/4 w-[700px] h-[700px] bg-primary-container rounded-full"></div>
<!-- Subtle Geometric Shapes -->
<div class="absolute top-20 right-[15%] w-32 h-32 border border-primary/10 rounded-xl rotate-12"></div>
<div class="absolute bottom-40 left-[10%] w-48 h-48 border border-secondary/10 rounded-full"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Brand Identity Container -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-[0_20px_40px_rgba(129,69,134,0.15)] mb-6">
<span class="material-symbols-outlined text-on-primary text-4xl" style="font-variation-settings: 'FILL' 1;">skull</span>
</div>
<h1 class="font-headline text-3xl font-black tracking-tighter text-on-surface flex flex-col items-center">
<span class="bg-gradient-to-br from-primary to-secondary bg-clip-text text-transparent">Influence Pirates</span>
<span class="text-xs font-bold tracking-[0.3em] uppercase text-outline opacity-40 mt-1">Luminous Lab Edition</span>
</h1>
</div>
<!-- Elegant Login Card -->
<div class="surface-container-lowest holo-prism-blur bg-white/70 rounded-lg p-8 md:p-10 shadow-[0_40px_100px_rgba(129,69,134,0.08)] border border-primary-fixed-dim/20">
<div class="text-center mb-10">
<h2 class="font-headline text-4xl font-bold tracking-tight text-on-surface mb-2">Welcome back</h2>
<p class="text-on-surface-variant font-light">Enter the lab and synchronize your intel.</p>
</div>
<div class="space-y-4">
<!-- Sign in with Google -->
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-surface-container-lowest border border-outline-variant/30 rounded-full hover:bg-surface-container-low transition-all duration-300 group active:scale-95">
<img alt="Google" class="w-5 h-5" data-alt="Official Google logo with vibrant red, yellow, green, and blue segments" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpEUb3usZ1v3oNKVtD1T-vPVOncQM-p42LbDYTK6FI8bZOYsG9TdQa5EzZBkNgwhuuTnuvV19U3ZKhb0phG8NeIjcS0Hw3vTsvTJjbYgIF_KFVbTMkrewwZVEDkUm110oDWrTFLDZ1ypmEDN-MrP49mQrbK2s-TMNcow65pB2lUCGgeY6KHipaDSQP9spRLraQkzNgjQfm8ceTLYIAV7BE_kXEfAwal9BFl1ZCuZpgKbP_0LeGL3shLVxMFo1PjdO4abcPyHruFNl3"/>
<span class="font-medium text-on-surface">Sign in with Google</span>
</button>
<!-- Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-xs font-bold tracking-widest text-outline uppercase">Or</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Sign in with Magic Link -->
<div class="space-y-4">
<div class="relative group">
<label class="sr-only">Email address</label>
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl">alternate_email</span>
</div>
<input class="block w-full pl-12 pr-5 py-4 bg-surface-container-lowest border-0 rounded-lg ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary/40 focus:bg-white transition-all duration-300 placeholder:text-outline/50" placeholder="agent@luminous-lab.io" type="email"/>
</div>
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-secondary text-on-primary rounded-full font-headline font-bold tracking-tight text-lg shadow-[0_10px_25px_rgba(156,66,63,0.25)] hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
                        Sign in with Magic Link
                    </button>
</div>
</div>
<!-- Signup Link -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-bold text-primary hover:text-secondary transition-colors underline-offset-4 hover:underline" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Footer / Technical Specs -->
<div class="mt-8 flex justify-center gap-8 opacity-40">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-[10px] font-headline font-bold uppercase tracking-[0.2em]">End-to-End Intel</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">charging_station</span>
<span class="text-[10px] font-headline font-bold uppercase tracking-[0.2em]">Holo-Prism v4.2</span>
</div>
</div>
</main>
<!-- Interactive Layer: Floating Detail -->
<div class="absolute top-10 left-10 hidden lg:block opacity-20 hover:opacity-100 transition-opacity duration-700">
<div class="flex items-center gap-4 bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<div class="text-[10px] font-headline uppercase tracking-tighter">
<div class="text-on-surface font-black">System Status</div>
<div class="text-primary">All Nodes Operational</div>
</div>
</div>
</div>
</body></html>
